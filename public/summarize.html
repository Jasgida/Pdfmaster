<!doctype html>

<html lang="en" class="">

<head>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>PDFMaster - Summarize & Chat with PDF</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/output.css">

    <script>

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {

            document.documentElement.classList.add('dark');

        } else {

            document.documentElement.classList.remove('dark');

        }

    </script>

</head>

<body class="bg-bg-light dark:bg-bg-dark text-text-primary-light dark:text-text-primary-dark font-sans antialiased flex flex-col min-h-screen">

    <!-- Header (same as index.html, omitted for brevity) -->

    <header><!-- ... --></header>

    <main class="container mx-auto px-4 py-24 flex-grow">

        <div class="max-w-2xl mx-auto">

            <div class="text-center mb-8">

                <h1 class="text-3xl font-bold tracking-tight text-text-primary-light dark:text-text-primary-dark sm:text-4xl font-serif">Summarize & Chat with PDF</h1>

                <p class="mt-2 text-lg text-text-secondary-light dark:text-text-secondary-dark">Use AI to summarize and ask questions about your PDF documents.</p>

            </div>

            <div class="rounded-xl border border-accent-light dark:border-accent-dark bg-bg-light dark:bg-bg-dark/50 p-6 sm:p-8 shadow-sm">

                <form id="upload-form" action="/summarize" method="post" enctype="multipart/form-data">

                    <div class="mb-6">

                        <label for="file" class="block mb-2 text-sm font-medium text-text-primary-light dark:text-text-primary-dark">Upload your PDF</label>

                        <input type="file" id="file" name="file" accept="application/pdf" required class="block w-full text-sm text-text-secondary-light dark:text-text-secondary-dark file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-accent-light dark:file:bg-accent-dark file:text-text-primary-light dark:file:text-text-primary-dark hover:file:bg-accent-light/80 dark:hover:file:bg-accent-dark/80 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-button-bg dark:focus:ring-offset-bg-dark">

                    </div>

                    <div class="mt-6">

                        <button type="submit" class="btn-primary">

                            <svg class="h-5 w-5 mr-2 text-white" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22h6a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v5"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m4 18 1.5-1.5.5.5L4.5 18.5.5 20l1.5-4Z"/><path d="m2.5 16.5.5.5L4.5 15H6v-1.5l-1.5-1.5-.5.5L2.5 14Z"/></svg>

                            Upload and Summarize

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </main>

</body>

</html>
