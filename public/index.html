<!DOCTYPE html>

<html lang="en" class="light">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PDFMaster</title>

  <link rel="stylesheet" href="/output.css">

</head>

<body class="font-sans">

  <header class="bg-bg-light dark:bg-bg-dark p-4 shadow-md">

    <nav class="flex justify-between items-center max-w-7xl mx-auto">

      <a class="flex items-center gap-2" href="/">

        <svg class="h-5 w-5 text-icon-default dark:text-icon-dark-default" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          <path d="M4 15.5A3.5 3.5 0 0 1 7.5 12H14a2 2 0 0 1 2 2v1.5a2.5 2.5 0 0 1-2.5 2.5h-8.5A2.5 2.5 0 0 1 4 15.5Z"/>

          <path d="M16 8.5a3 3 0 0 0-3-3H9.5a3 3 0 0 0-3 3v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-6.5Z"/>

        </svg>

        <span class="font-serif font-bold text-lg">PDFMaster</span>

      </a>

      <div class="flex items-center space-x-4">

        <a href="/merge" class="hover:underline">Merge</a>

        <a href="/summarize" class="hover:underline">Summarize</a>

        <button class="btn-primary">Upload PDF</button>

        <label class="relative inline-flex items-center cursor-pointer">

          <input type="checkbox" class="sr-only" id="theme-toggle">

          <div class="w-11 h-6 bg-accent-light dark:bg-accent-dark rounded-full p-1 transition-colors duration-200 ease-in-out">

            <div class="w-4 h-4 bg-bg-dark dark:bg-bg-light rounded-full transform transition-transform duration-200 ease-in-out" id="theme-toggle-ball"></div>

          </div>

        </label>

      </div>

    </nav>

  </header>


  <main class="max-w-7xl mx-auto p-4">

    <div class="thinking-indicator">

      <span></span><span></span><span></span>

    </div>

    <div class="message-text">

      <h1 class="text-2xl font-bold mb-4">Welcome to PDFMaster</h1>

      <p class="mb-4">Upload a PDF or select an action to get started.</p>

      <form action="/upload" method="post" enctype="multipart/form-data">

        <input type="file" name="pdf" accept=".pdf" class="mb-2">

        <button type="submit" class="btn-primary">Upload</button>

      </form>

    </div>

  </main>


  <script>

    const toggle = document.getElementById('theme-toggle');

    const ball = document.getElementById('theme-toggle-ball');

    const html = document.documentElement;


    toggle.addEventListener('change', () => {

      html.classList.toggle('light');

      html.classList.toggle('dark');

      ball.classList.toggle('translate-x-5');

    });

  </script>

</body>

</html>
